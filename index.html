<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高橋吳氏宗譜 · 卷十三世系</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="header">

      <div class="search-results" id="searchResults"></div>

    </div>
  </div>
</div>
<div class="layout">

    <div class="sidebar-title">房 支 导 航</div>

  <main class="main" id="main">

    <div class="tree-container" id="treeContainer"></div>
  </main>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="close-btn" onclick="closeModal()">&times;</button>

    <div class="modal-body" id="modalBody"></div>
