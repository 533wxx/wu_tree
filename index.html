<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>高橋吳氏宗譜 · 卷十三世系</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  /* 确保头部固定在视口最上层，永不滚动 */
  html, body { overflow: hidden; height: 100%; }
  body { padding-top: 0; }
  body::before { z-index: -1; }
  .layout {
    height: 100vh; height: 100dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-top: 93px;
  }
  .header {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    z-index: 9999 !important;
    background: #0c0a08 !important;
    -webkit-transform: translateZ(0) !important;
  }
  .modal-overlay { z-index: 10000 !important; }
  @media (max-width: 900px) {
    .layout { padding-top: 100px; }
    .sidebar { padding-top: 100px !important; }
  }
  @media (max-width: 600px) {
    .layout { padding-top: 110px; }
    .sidebar { padding-top: 110px !important; }
  }
</style>
<link rel="stylesheet" href="styles.css?v=11">
</head>
<body>
<div class="header">
  <div class="header-inner">
    <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
    <div class="title-block">
      <h1 class="title">高橋吳氏宗譜</h1>
      <span class="subtitle">卷十三 · 世系 · 二〇二六年丙午岁重修</span>
    </div>
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="搜索姓名、字号…" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">房 支 导 航</div>
    <div id="branchList"></div>
  </aside>
  <main class="main" id="main">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="tree-container" id="treeContainer"></div>
  </main>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div><script src="data.js?v=11"></script>
<script src="app.js?v=13"></script>
</body>
</html>
